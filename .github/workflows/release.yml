name: Release

# Releases AND the GitHub Pages deployment are created ONLY when a strict
# semantic-version tag (vMAJOR.MINOR.PATCH, e.g. v0.1.1) is pushed. Ordinary
# pushes to main, pull requests, non-version tags, and malformed tags never
# reach this workflow (the tag filter is numeric) and, as defense in depth,
# would still be rejected by the "Validate tag format" step below. The PR/main
# checks live in ci.yml.
on:
  push:
    tags:
      # GitHub tag filter glob: [0-9]+ = one or more digits, '.' is literal.
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Least privilege by default: read-only. Each job widens only what it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # The release job alone gets write access, and only to repository contents,
    # to publish the GitHub Release assets. It also builds the static site and
    # uploads it as the Pages artifact for the deploy-pages job to publish.
    permissions:
      contents: write
    steps:
      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag '$TAG' does not match v<major>.<minor>.<patch>" >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package.json version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PKG_VERSION}" != "$TAG" ]; then
            echo "Tag '$TAG' does not match package.json version 'v${PKG_VERSION}'." >&2
            echo "The application version is defined once in package.json." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # The site is fully static and self-contained (embedded WASM, relative
      # asset paths, no network) so the same dist/ that works from file:// also
      # works when served from https://<owner>.github.io/<repository>/. Only
      # upload it as the Pages artifact AFTER every check and the build above
      # have succeeded, so a broken build never reaches Pages.
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Package release ZIP
        id: package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          SHORT_HASH="$(git rev-parse --short HEAD)"
          ZIP_NAME="refrain-sheet-v${VERSION}-${SHORT_HASH}.zip"
          STAGE="refrain-sheet-v${VERSION}"
          mkdir -p "stage/${STAGE}"
          cp -r dist/* "stage/${STAGE}/"
          cp README.md LICENSE THIRD-PARTY-NOTICES.md "stage/${STAGE}/"
          (cd stage && zip -r "../${ZIP_NAME}" "${STAGE}")
          sha256sum "${ZIP_NAME}" > "${ZIP_NAME}.sha256"
          cat "${ZIP_NAME}.sha256"
          {
            echo "zip_name=${ZIP_NAME}"
            echo "version=${VERSION}"
            echo "short_hash=${SHORT_HASH}"
          } >> "$GITHUB_OUTPUT"

      - name: Write release notes
        env:
          VERSION: ${{ steps.package.outputs.version }}
          SHORT_HASH: ${{ steps.package.outputs.short_hash }}
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          # Refrain Sheet v${VERSION}

          A local-first, format-preserving CSV and spreadsheet editor.
          （ローカルで動く、書式保持CSV・スプレッドシートエディタです。）

          - Version: ${VERSION}
          - Commit: ${SHORT_HASH}

          ## Verify the download

          \`\`\`sh
          sha256sum -c ${ZIP_NAME}.sha256
          \`\`\`

          ## How to use

          1. Download and extract \`${ZIP_NAME}\`.
          2. Open \`index.html\` directly in a browser (double-click, or
             drag it onto a browser window). No installation, server, or
             network connection is required — everything runs offline.
          3. Open CSV files via File > Open or drag & drop, edit cell
             values, and save.

          ## Save limitations under file:// and browser permissions

          - In Chromium-based browsers, files opened through the file picker
            can usually be overwritten in place (File System Access API).
            The browser asks for write permission first.
          - Where the API is unavailable (Firefox, Safari, some file://
            contexts) or permission is denied, saving falls back to a
            **download**: the browser chooses the download location and the
            original file is NOT overwritten. The app tells you which kind
            of save happened.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          ZIP_NAME: ${{ steps.package.outputs.zip_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ZIP_NAME}" "${ZIP_NAME}.sha256" \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --notes-file release-notes.md
          else
            gh release create "$TAG" "${ZIP_NAME}" "${ZIP_NAME}.sha256" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Refrain Sheet ${TAG}" \
              --notes-file release-notes.md
          fi

  # Publish the built dist/ to GitHub Pages. This runs ONLY after the release
  # job (tag validation + full verification suite + build + upload) succeeds, so
  # a broken or unchecked artifact is never deployed. It needs no secrets: the
  # official Pages actions authenticate with the run's GITHUB_TOKEN and OIDC.
  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    # Only the permissions the Pages deployment requires — no contents access.
    permissions:
      pages: write
      id-token: write
    # A named environment records the deployment and surfaces the live URL.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Never run two Pages deployments at once, and never cancel one mid-publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    # Expose the deployed site URL as a job output.
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
